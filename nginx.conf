# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name telaven.com www.telaven.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://telaven.com$request_uri;
    }
}

# ─── Redirect www → non-www (HTTPS) ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.telaven.com;

    ssl_certificate     /etc/letsencrypt/live/telaven.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telaven.com/privkey.pem;

    return 301 https://telaven.com$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name telaven.com;

    ssl_certificate     /etc/letsencrypt/live/telaven.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telaven.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Logging
    access_log /var/log/nginx/telaven.access.log;
    error_log  /var/log/nginx/telaven.error.log;

    # File upload limit
    client_max_body_size 10M;

    # ─── Next.js static assets (long cache) ──────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Public static files ─────────────────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Proxy to Next.js app ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
